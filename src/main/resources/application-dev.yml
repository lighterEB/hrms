spring:
  datasource:
    url: jdbc:mysql://1.94.160.101:13306/hrmgmt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root123456.
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 现有配置保持不变
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

      # 调整这些参数
      time-between-eviction-runs-millis: 30000      # 降低到30秒，更频繁地检查
      min-evictable-idle-time-millis: 180000       # 空闲连接最小生存时间3分钟
      max-evictable-idle-time-millis: 300000       # 空闲连接最大生存时间5分钟

      # 添加这些配置
      keep-alive: true                             # 开启keepAlive
      keep-alive-between-time-millis: 120000       # keepAlive间隔2分钟

      # 优化检测配置
      validation-query: SELECT 1
      validation-query-timeout: 5                   # 检测超时时间5秒
      test-while-idle: true                        # 开启空闲检测
      test-on-borrow: true                         # 获取连接时检测
      test-on-return: false                        # 归还连接时不检测
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
        wall:
          enabled: true
        slf4j:
          enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
  data:
    redis:
      host: 1.94.160.101
      port: 6379
      password: root123456.
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 缓存过期时间，这里设置为1小时
      cache-null-values: true # 是否缓存空值

logging:
  level:
    root: info
    org.springframework.security: DEBUG
    com.lightereb.hrms: DEBUG